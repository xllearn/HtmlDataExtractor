<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据库文章选择</title>
  <style>
    :root {
      --bg: #f4f6f8;
      --panel: #fff;
      --line: #d7dde5;
      --text: #1f2937;
      --muted: #64748b;
      --brand: #176b87;
      --bad: #b91c1c;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif; background: var(--bg); color: var(--text); }
    header { background: #12343f; color: #fff; padding: 20px 28px; border-bottom: 4px solid #e4b363; }
    header h1 { margin: 0; font-size: 22px; }
    main { padding: 18px; max-width: 1600px; margin: 0 auto; }
    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; box-shadow: 0 8px 20px rgba(15,23,42,.06); margin-bottom: 16px; }
    .panel h2 { margin: 0; padding: 13px 15px; font-size: 16px; border-bottom: 1px solid var(--line); }
    .panel-body { padding: 15px; }
    .grid { display: grid; grid-template-columns: repeat(5, minmax(160px, 1fr)); gap: 12px; }
    label { display: block; font-weight: 700; font-size: 13px; margin-bottom: 6px; }
    input, select { width: 100%; border: 1px solid #b8c2d2; border-radius: 6px; padding: 9px 10px; font: inherit; background: #fff; }
    .actions { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin-top: 14px; }
    button { border: 0; border-radius: 6px; padding: 10px 14px; font-weight: 700; cursor: pointer; min-height: 38px; }
    button.primary { background: var(--brand); color: #fff; }
    button.secondary { background: #e2e8f0; color: #1e293b; }
    .status { color: var(--muted); font-size: 13px; min-height: 20px; }
    .status.error { color: var(--bad); }
    .table-wrap { overflow: auto; max-height: 560px; border-top: 1px solid var(--line); }
    table { width: 100%; min-width: 1450px; border-collapse: collapse; font-size: 12px; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 8px 9px; text-align: left; vertical-align: top; }
    th { background: #f8fafc; position: sticky; top: 0; z-index: 1; white-space: nowrap; }
    .preview { max-width: 360px; color: #475569; }
    .pager { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
    .json { margin: 0; white-space: pre-wrap; word-break: break-word; background: #f8fafc; border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px; max-height: 260px; overflow: auto; font-size: 12px; }
    @media (max-width: 1000px) { .grid { grid-template-columns: 1fr; } main { padding: 12px; } }
  </style>
</head>
<body>
  <header><h1>数据库文章选择</h1></header>
  <main>
    <section class="panel">
      <h2>配置</h2>
      <div class="panel-body">
        <div class="grid">
          <div><label for="configPath">数据库配置文件路径</label><input id="configPath" value="config/db_config.yml"></div>
          <div><label for="fieldConfigPath">字段配置文件路径</label><input id="fieldConfigPath" value="config/field_mapping.yml"></div>
          <div><label for="templatePath">Excel 模板路径</label><input id="templatePath" value="template/陕西西安.xlsx"></div>
          <div><label for="keyword">关键词/语义搜索</label><input id="keyword" value=""></div>
          <div><label for="outputFile">输出文件名</label><input id="outputFile" value="outputs/result.xlsx"></div>
        </div>
        <div class="actions">
          <button class="primary" id="loadBtn">加载数据库内容</button>
          <button class="secondary" id="selectPageBtn">全选当前页</button>
          <button class="secondary" id="clearBtn">清空选择</button>
          <button class="primary" id="startBtn">开始提取已选择数据</button>
          <span id="selectedCount" class="status">已选择 0 条</span>
        </div>
        <div id="status" class="status"></div>
      </div>
    </section>

    <section class="panel">
      <h2>数据库内容列表</h2>
      <div class="panel-body pager">
        <button class="secondary" id="prevBtn">上一页</button>
        <span id="pageInfo">第 1 页</span>
        <button class="secondary" id="nextBtn">下一页</button>
        <label for="pageSize" style="margin:0;">每页条数</label>
        <select id="pageSize" style="width:90px;">
          <option>10</option>
          <option selected>20</option>
          <option>50</option>
          <option>100</option>
        </select>
      </div>
      <div class="table-wrap"><table id="recordTable"></table></div>
    </section>

    <section class="panel">
      <h2>示例校验</h2>
      <div class="panel-body">
        <div class="actions"><button class="secondary" id="sampleBtn">加载示例</button><span id="sampleStatus" class="status"></span></div>
        <pre id="sampleRecord" class="json"></pre>
        <div class="table-wrap" style="margin-top:12px;"><table id="sampleDiffTable"></table></div>
      </div>
    </section>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const selectedIds = new Set();
    let page = 1;
    let total = 0;
    let records = [];

    function setStatus(text, error = false) {
      $("status").textContent = text;
      $("status").className = error ? "status error" : "status";
    }

    function updateSelectedCount() {
      $("selectedCount").textContent = `已选择 ${selectedIds.size} 条`;
    }

    function renderTable(tableId, rows, headers, renderer) {
      const table = $(tableId);
      table.innerHTML = "";
      const thead = document.createElement("thead");
      const tr = document.createElement("tr");
      headers.forEach((header) => {
        const th = document.createElement("th");
        th.textContent = header;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
      table.appendChild(thead);
      const tbody = document.createElement("tbody");
      rows.forEach((row) => tbody.appendChild(renderer(row)));
      table.appendChild(tbody);
    }

    function renderRecords() {
      const headers = ["选择", "source_id", "info_id", "title", "article_time", "audit_time", "region", "related_info", "content_preview"];
      renderTable("recordTable", records, headers, (row) => {
        const tr = document.createElement("tr");
        const checkTd = document.createElement("td");
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = selectedIds.has(row.source_id);
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) selectedIds.add(row.source_id);
          else selectedIds.delete(row.source_id);
          updateSelectedCount();
        });
        checkTd.appendChild(checkbox);
        tr.appendChild(checkTd);
        headers.slice(1).forEach((header) => {
          const td = document.createElement("td");
          td.textContent = row[header] ?? "";
          if (header === "content_preview") td.className = "preview";
          tr.appendChild(td);
        });
        return tr;
      });
      const pageSize = Number($("pageSize").value);
      const pages = Math.max(1, Math.ceil(total / pageSize));
      $("pageInfo").textContent = `第 ${page} / ${pages} 页，共 ${total} 条`;
      updateSelectedCount();
    }

    async function loadRecords(nextPage = 1) {
      page = nextPage;
      const params = new URLSearchParams({
        config_path: $("configPath").value.trim(),
        keyword: $("keyword").value.trim(),
        page: String(page),
        page_size: $("pageSize").value
      });
      setStatus("正在加载数据库内容...");
      const response = await fetch(`/api/db/records?${params.toString()}`);
      const data = await response.json();
      if (!response.ok) {
        setStatus(data.detail || response.statusText, true);
        return;
      }
      total = data.total;
      records = data.records || [];
      renderRecords();
      setStatus("数据库内容已加载");
    }

    function selectCurrentPage() {
      records.forEach((row) => selectedIds.add(row.source_id));
      renderRecords();
    }

    function clearSelection() {
      selectedIds.clear();
      renderRecords();
    }

    async function startSelected() {
      if (selectedIds.size === 0) {
        setStatus("请至少选择一条数据", true);
        return;
      }
      const payload = {
        config_path: $("configPath").value.trim(),
        field_config_path: $("fieldConfigPath").value.trim(),
        template_path: $("templatePath").value.trim(),
        keyword: $("keyword").value.trim(),
        output_file: $("outputFile").value.trim(),
        selected_ids: Array.from(selectedIds)
      };
      setStatus("正在提交提取任务...");
      const response = await fetch("/api/task/start-selected", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (!response.ok) {
        setStatus(data.detail || response.statusText, true);
        return;
      }
      window.location.href = `/static/result.html?task_id=${encodeURIComponent(data.task_id)}`;
    }

    async function loadSample() {
      $("sampleStatus").textContent = "正在加载示例...";
      const response = await fetch("/api/sample");
      const data = await response.json();
      $("sampleRecord").textContent = JSON.stringify(data.record, null, 2);
      $("sampleStatus").textContent = data.sample_matched ? "示例结果与期望一致" : "示例结果与期望不一致";
      renderTable("sampleDiffTable", data.diff_fields || [], ["field", "expected", "actual"], (row) => {
        const tr = document.createElement("tr");
        ["field", "expected", "actual"].forEach((key) => {
          const td = document.createElement("td");
          td.textContent = row[key] ?? "";
          tr.appendChild(td);
        });
        return tr;
      });
    }

    $("loadBtn").addEventListener("click", () => loadRecords(1));
    $("prevBtn").addEventListener("click", () => loadRecords(Math.max(1, page - 1)));
    $("nextBtn").addEventListener("click", () => loadRecords(page + 1));
    $("pageSize").addEventListener("change", () => loadRecords(1));
    $("selectPageBtn").addEventListener("click", selectCurrentPage);
    $("clearBtn").addEventListener("click", clearSelection);
    $("startBtn").addEventListener("click", startSelected);
    $("sampleBtn").addEventListener("click", loadSample);
    loadRecords(1);
  </script>
</body>
</html>
