<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据库文章内容自动提取与 Excel 整理工具</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f6f8;
      --panel: #ffffff;
      --line: #d7dde5;
      --text: #1f2937;
      --muted: #64748b;
      --brand: #176b87;
      --brand-dark: #0f4f66;
      --ok: #0f766e;
      --bad: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      background: #12343f;
      color: #fff;
      padding: 20px 28px;
      border-bottom: 4px solid #e4b363;
    }
    header h1 { margin: 0; font-size: 22px; }
    main { padding: 20px; max-width: 1500px; margin: 0 auto; }
    .layout { display: grid; grid-template-columns: 420px 1fr; gap: 18px; align-items: start; }
    .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.06);
    }
    .panel h2 {
      font-size: 16px;
      margin: 0;
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
    }
    .panel-body { padding: 15px; }
    label { display: block; font-weight: 700; font-size: 13px; margin: 13px 0 6px; }
    input {
      width: 100%;
      border: 1px solid #b8c2d2;
      border-radius: 6px;
      padding: 10px 11px;
      font: inherit;
      background: #fff;
    }
    .actions { display: flex; gap: 10px; margin-top: 16px; flex-wrap: wrap; }
    button, .download {
      border: 0;
      border-radius: 6px;
      padding: 10px 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 38px;
    }
    button.primary { background: var(--brand); color: #fff; }
    button.primary:hover { background: var(--brand-dark); }
    button.secondary { background: #e2e8f0; color: #1e293b; }
    .download { background: var(--ok); color: #fff; }
    .download.disabled { pointer-events: none; opacity: .45; }
    .status { margin-top: 12px; color: var(--muted); font-size: 13px; min-height: 20px; }
    .status.error { color: var(--bad); }
    .table-wrap { overflow: auto; max-height: 480px; border-top: 1px solid var(--line); }
    table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 1400px; }
    th, td { border-bottom: 1px solid #e5e7eb; padding: 8px 9px; text-align: left; vertical-align: top; }
    th { background: #f8fafc; position: sticky; top: 0; z-index: 1; white-space: nowrap; }
    .json {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      background: #f8fafc;
      border: 1px solid #e5e7eb;
      border-radius: 6px;
      padding: 10px;
      max-height: 280px;
      overflow: auto;
      font-size: 12px;
    }
    @media (max-width: 900px) {
      .layout { grid-template-columns: 1fr; }
      main { padding: 12px; }
    }
  </style>
</head>
<body>
  <header>
    <h1>数据库文章内容自动提取与 Excel 整理工具</h1>
  </header>
  <main>
    <div class="layout">
      <section class="panel">
        <h2>提取任务</h2>
        <div class="panel-body">
          <label for="configPath">数据库配置文件路径</label>
          <input id="configPath" value="config/db_config.yml">

          <label for="fieldConfigPath">字段配置文件路径</label>
          <input id="fieldConfigPath" value="config/field_mapping.yml">

          <label for="templatePath">Excel 模板路径</label>
          <input id="templatePath" value="template/陕西西安.xlsx">

          <label for="keyword">关键词/语义搜索</label>
          <input id="keyword" value="">

          <label for="outputFile">输出文件名</label>
          <input id="outputFile" value="outputs/result.xlsx">

          <div class="actions">
            <button class="primary" id="startBtn">开始提取</button>
            <button class="secondary" id="sampleBtn">加载示例</button>
            <a id="downloadBtn" class="download disabled" href="#">下载 Excel</a>
          </div>
          <div id="status" class="status"></div>
        </div>
      </section>

      <section class="panel">
        <h2>结果预览</h2>
        <div class="table-wrap"><table id="resultTable"></table></div>
      </section>
    </div>

    <section class="panel" style="margin-top:18px;">
      <h2>采集日志</h2>
      <div class="table-wrap"><table id="logTable"></table></div>
    </section>

    <section class="panel" style="margin-top:18px;">
      <h2>模拟数据库记录</h2>
      <div class="panel-body"><pre id="sampleRecord" class="json"></pre></div>
    </section>
  </main>
  <script>
    const columns = [
      "文章时间","审核日期","info_id","地区名称","个人账户计入办法","个人账户使用范围","病种名称","类型","标化类型","保险类型","人员类型","病种类型","就诊地域","医院类型","就诊情况","区间","起付标准","补助限额","报销比例","备注","相关资讯","审核状态0待审核1已审核","执行状态","开始执行时间","结束时间","是否需要手动修改执行状态(1是0否)"
    ];
    const $ = (id) => document.getElementById(id);

    function setStatus(text, error = false) {
      $("status").textContent = text;
      $("status").className = error ? "status error" : "status";
    }

    function renderTable(id, rows, headers) {
      const table = $(id);
      table.innerHTML = "";
      const thead = document.createElement("thead");
      const headRow = document.createElement("tr");
      headers.forEach((header) => {
        const th = document.createElement("th");
        th.textContent = header;
        headRow.appendChild(th);
      });
      thead.appendChild(headRow);
      table.appendChild(thead);
      const tbody = document.createElement("tbody");
      rows.forEach((row) => {
        const tr = document.createElement("tr");
        headers.forEach((header) => {
          const td = document.createElement("td");
          td.textContent = row[header] ?? "";
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
    }

    async function loadSample() {
      setStatus("正在加载示例...");
      const res = await fetch("/api/sample");
      const data = await res.json();
      $("sampleRecord").textContent = JSON.stringify(data.record, null, 2);
      renderTable("resultTable", [data.result], columns);
      renderTable("logTable", data.logs || [], ["source_id", "info_id", "title", "status", "message", "records", "time"]);
      setStatus("示例已加载");
    }

    async function pollTask(taskId) {
      const statusRes = await fetch(`/api/task/status/${taskId}`);
      const status = await statusRes.json();
      setStatus(status.message || status.status, status.status === "failed");
      if (status.status === "completed") {
        const resultRes = await fetch(`/api/task/result/${taskId}`);
        const result = await resultRes.json();
        renderTable("resultTable", result.data || [], columns);
        renderTable("logTable", result.logs || [], ["source_id", "info_id", "title", "status", "message", "records", "time"]);
        $("downloadBtn").href = `/api/task/download/${taskId}`;
        $("downloadBtn").classList.remove("disabled");
        return;
      }
      if (status.status === "failed") return;
      setTimeout(() => pollTask(taskId), 1200);
    }

    async function startTask() {
      $("downloadBtn").classList.add("disabled");
      setStatus("正在提交任务...");
      const payload = {
        config_path: $("configPath").value.trim(),
        field_config_path: $("fieldConfigPath").value.trim(),
        template_path: $("templatePath").value.trim(),
        keyword: $("keyword").value.trim(),
        output_file: $("outputFile").value.trim()
      };
      const res = await fetch("/api/task/start", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload)
      });
      if (!res.ok) {
        setStatus(await res.text(), true);
        return;
      }
      const data = await res.json();
      pollTask(data.task_id);
    }

    $("sampleBtn").addEventListener("click", loadSample);
    $("startBtn").addEventListener("click", startTask);
    loadSample();
  </script>
</body>
</html>
