<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>数据库文章选择</title>
  <style>
    :root {
      --primary: #0f5f75;
      --primary-dark: #0f3d4a;
      --accent: #f2b84b;
      --bg: #f4f7fb;
      --card: #ffffff;
      --border: #d8e1ea;
      --text: #1f2937;
      --muted: #6b7280;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --info: #2563eb;
      --shadow: 0 10px 24px rgba(15, 23, 42, .07);
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    .topbar {
      height: 64px;
      display: flex;
      align-items: center;
      padding: 0 28px;
      background: linear-gradient(135deg, var(--primary-dark), #062b36);
      color: #fff;
      border-bottom: 3px solid var(--accent);
      box-shadow: 0 4px 14px rgba(15, 61, 74, .22);
    }
    .topbar h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 21px;
      letter-spacing: 0;
    }
    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      min-height: 52px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .card-title {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 9px;
      font-size: 16px;
      font-weight: 700;
      color: #0f2530;
    }
    .card-body { padding: 18px; }
    .config-grid {
      display: grid;
      grid-template-columns: repeat(5, minmax(180px, 1fr));
      gap: 14px;
    }
    .search-row {
      display: grid;
      grid-template-columns: minmax(260px, 520px) minmax(260px, 1fr);
      gap: 14px;
      align-items: end;
    }
    .toggle-row {
      min-height: 38px;
      display: flex;
      align-items: center;
      gap: 10px;
      color: #344054;
      font-size: 13px;
    }
    .toggle-row input { width: 16px; height: 16px; }
    details.advanced {
      margin-top: 14px;
      border: 1px solid #e5eaf0;
      border-radius: 8px;
      background: #f8fafc;
    }
    details.advanced summary {
      cursor: pointer;
      padding: 11px 13px;
      color: var(--primary);
      font-weight: 700;
    }
    details.advanced .config-grid { padding: 0 13px 13px; }
    .field label {
      display: block;
      margin: 0 0 7px;
      color: #344054;
      font-size: 12px;
      font-weight: 700;
    }
    input, select {
      width: 100%;
      height: 38px;
      border: 1px solid #c8d3df;
      border-radius: 6px;
      padding: 8px 10px;
      background: #fff;
      color: var(--text);
      font: inherit;
      outline: none;
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    input:focus, select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(15, 95, 117, .14);
    }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
    }
    .btn {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 9px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s ease, border-color .15s ease, transform .12s ease, box-shadow .15s ease;
      white-space: nowrap;
    }
    .btn:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 95, 117, .18);
    }
    .btn:disabled {
      cursor: not-allowed;
      opacity: .58;
      transform: none;
      box-shadow: none;
    }
    .btn-primary { background: var(--primary); }
    .btn-primary:hover:not(:disabled) { background: #0d5368; }
    .btn-emphasis { background: #086987; }
    .btn-emphasis:hover:not(:disabled) { background: #075671; }
    .btn-secondary {
      background: #eef3f8;
      border-color: #d6e0ea;
      color: #223344;
    }
    .btn-secondary:hover:not(:disabled) { background: #e3ebf3; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 26px;
      padding: 4px 10px;
      border-radius: 999px;
      background: #e8f4f8;
      color: var(--primary);
      font-size: 12px;
      font-weight: 700;
      white-space: nowrap;
    }
    .alert {
      display: none;
      margin-top: 14px;
      padding: 10px 12px;
      border-radius: 6px;
      font-size: 13px;
      border: 1px solid transparent;
    }
    .alert.show { display: block; }
    .alert.info { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .alert.success { background: #ecfdf3; color: #15803d; border-color: #bbf7d0; }
    .alert.error { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .alert.warning { background: #fffbeb; color: #b45309; border-color: #fde68a; }
    .list-meta, .pager {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      color: var(--muted);
      font-size: 13px;
    }
    .list-meta select {
      width: 82px;
      height: 34px;
      flex: 0 0 82px;
    }
    .list-meta .btn {
      min-height: 34px;
      padding: 7px 12px;
    }
    .table-shell {
      width: 100%;
      overflow-x: auto;
      overflow-y: auto;
      max-height: 590px;
      border-top: 1px solid var(--border);
      background: #fff;
    }
    table {
      table-layout: fixed;
      min-width: 2160px;
      width: 2160px;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12px;
    }
    th, td {
      border-bottom: 1px solid #e8edf3;
      border-right: 1px solid #edf2f7;
      padding: 10px 11px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f6f8fb;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    tbody tr { transition: background .12s ease; }
    tbody tr:hover { background: #f8fbff; }
    tbody tr.selected-row { background: #eef7ff; }
    .col-check { width: 50px; text-align: center; }
    .col-source { width: 260px; }
    .col-info { width: 260px; }
    .col-title { width: 320px; }
    .col-date { width: 150px; }
    .col-region { width: 120px; }
    .col-related { width: 180px; }
    .col-preview { width: 420px; }
    td.check-cell { text-align: center; }
    td.check-cell input { width: 16px; height: 16px; }
    .mono {
      font-family: "Cascadia Mono", Consolas, "Courier New", monospace;
      font-size: 11px;
    }
    .cell-ellipsis {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .line-clamp-2, .line-clamp-3 {
      display: -webkit-box;
      -webkit-box-orient: vertical;
      overflow: hidden;
      white-space: normal;
      word-break: break-word;
    }
    .line-clamp-2 { -webkit-line-clamp: 2; line-clamp: 2; }
    .line-clamp-3 { -webkit-line-clamp: 3; line-clamp: 3; color: #475569; }
    details.sample-card summary {
      cursor: pointer;
      list-style: none;
    }
    details.sample-card summary::-webkit-details-marker { display: none; }
    .sample-grid {
      display: grid;
      grid-template-columns: minmax(260px, 1fr) minmax(260px, 1fr);
      gap: 14px;
      margin-top: 14px;
    }
    .json {
      margin: 0;
      max-height: 280px;
      overflow: auto;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid #e5eaf0;
      border-radius: 6px;
      background: #f8fafc;
      padding: 12px;
      font-size: 12px;
      line-height: 1.55;
    }
    @media (max-width: 1366px) {
      .config-grid { grid-template-columns: repeat(3, minmax(190px, 1fr)); }
      .search-row { grid-template-columns: 1fr 1fr; }
      main { padding: 16px; }
    }
    @media (max-width: 768px) {
      .topbar { padding: 0 16px; }
      .topbar h1 { font-size: 18px; }
      main { padding: 12px; }
      .card-header { align-items: flex-start; flex-direction: column; }
      .config-grid { grid-template-columns: 1fr; }
      .search-row { grid-template-columns: 1fr; }
      .btn { width: 100%; }
      .toolbar { align-items: stretch; }
      .sample-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1><span aria-hidden="true">📄</span><span>数据库文章选择</span></h1>
  </header>
  <main>
    <section class="card">
      <div class="card-header">
        <h2 class="card-title">提取配置</h2>
      </div>
      <div class="card-body">
        <div class="search-row">
          <div class="field"><label for="keyword">关键词/同义词扩展搜索</label><input id="keyword" placeholder="例如：医保 报销 门诊" value=""></div>
          <label class="toggle-row" for="useLlm">
            <input id="useLlm" type="checkbox" checked>
            <span>启用大模型提取</span>
            <span class="badge">未配置 DEEPSEEK_API_KEY 时自动使用规则提取</span>
          </label>
        </div>
        <div class="toolbar">
          <button class="btn btn-primary" id="loadBtn">加载数据库内容</button>
          <button class="btn btn-secondary" id="selectPageBtn">全选当前页</button>
          <button class="btn btn-secondary" id="clearBtn">清空选择</button>
          <button class="btn btn-emphasis" id="startBtn">开始提取已选择数据</button>
          <span id="selectedCount" class="badge">已选择 0 条</span>
        </div>
        <details class="advanced">
          <summary>高级配置</summary>
          <div class="config-grid">
            <div class="field"><label for="configPath">数据库配置文件路径</label><input id="configPath" value="config/db_config.yml"></div>
            <div class="field"><label for="fieldConfigPath">字段配置文件路径</label><input id="fieldConfigPath" value="config/field_mapping.yml"></div>
            <div class="field"><label for="templatePath">Excel 模板路径</label><input id="templatePath" value="template/陕西西安.xlsx"></div>
            <div class="field"><label for="llmConfigPath">LLM 配置文件路径</label><input id="llmConfigPath" value="config/llm_config.yml"></div>
          </div>
        </details>
        <div id="status" class="alert" role="status"></div>
      </div>
    </section>

    <section class="card">
      <div class="card-header">
        <h2 class="card-title">数据库内容列表</h2>
        <div class="list-meta">
          <span id="totalInfo">共 0 条</span>
          <span id="pageInfo">第 1 / 1 页</span>
          <span>每页</span>
          <select id="pageSize">
            <option>10</option>
            <option selected>20</option>
            <option>50</option>
            <option>100</option>
          </select>
          <span>条</span>
          <button class="btn btn-secondary" id="prevBtn">上一页</button>
          <button class="btn btn-secondary" id="nextBtn">下一页</button>
        </div>
      </div>
      <div class="table-shell"><table id="recordTable"></table></div>
    </section>

    <details class="card sample-card">
      <summary class="card-header">
        <h2 class="card-title">示例校验</h2>
        <span class="badge">可展开</span>
      </summary>
      <div class="card-body">
        <div class="toolbar" style="margin-top:0;">
          <button class="btn btn-secondary" id="sampleBtn">加载示例</button>
          <span id="sampleStatus" class="badge">未加载</span>
        </div>
        <div class="sample-grid">
          <div>
            <h3 class="card-title" style="font-size:14px;margin:0 0 8px;">模拟数据库记录</h3>
            <pre id="sampleRecord" class="json"></pre>
          </div>
          <div>
            <h3 class="card-title" style="font-size:14px;margin:0 0 8px;">差异字段</h3>
            <div class="table-shell" style="max-height:280px;"><table id="sampleDiffTable" style="min-width:720px;width:720px;"></table></div>
          </div>
        </div>
      </div>
    </details>
  </main>

  <script>
    const $ = (id) => document.getElementById(id);
    const selectedIds = new Set();
    let page = 1;
    let total = 0;
    let records = [];

    function setStatus(text, type = "info") {
      const el = $("status");
      el.textContent = text;
      el.className = text ? `alert show ${type}` : "alert";
    }

    function setLoading(button, isLoading, loadingText) {
      if (!button.dataset.label) button.dataset.label = button.textContent;
      button.disabled = isLoading;
      button.textContent = isLoading ? loadingText : button.dataset.label;
    }

    function updateSelectedCount() {
      $("selectedCount").textContent = `已选择 ${selectedIds.size} 条`;
    }

    function renderTable(tableId, rows, headers, renderer, colgroupHtml = "") {
      const table = $(tableId);
      table.innerHTML = colgroupHtml;
      const thead = document.createElement("thead");
      const tr = document.createElement("tr");
      headers.forEach((header) => {
        const th = document.createElement("th");
        th.textContent = header;
        tr.appendChild(th);
      });
      thead.appendChild(tr);
      table.appendChild(thead);
      const tbody = document.createElement("tbody");
      rows.forEach((row) => tbody.appendChild(renderer(row)));
      table.appendChild(tbody);
    }

    function textSpan(value, className = "cell-ellipsis") {
      const span = document.createElement("span");
      const text = value ?? "";
      span.className = className;
      span.textContent = text;
      span.title = text;
      return span;
    }

    function renderRecords() {
      const headers = ["选择", "source_id", "info_id", "title", "article_time", "audit_time", "region", "related_info", "content_preview"];
      const colgroup = `
        <colgroup>
          <col class="col-check"><col class="col-source"><col class="col-info"><col class="col-title">
          <col class="col-date"><col class="col-date"><col class="col-region"><col class="col-related"><col class="col-preview">
        </colgroup>`;
      renderTable("recordTable", records, headers, (row) => {
        const tr = document.createElement("tr");
        if (selectedIds.has(row.source_id)) tr.classList.add("selected-row");
        const checkTd = document.createElement("td");
        checkTd.className = "check-cell";
        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.checked = selectedIds.has(row.source_id);
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) {
            selectedIds.add(row.source_id);
            tr.classList.add("selected-row");
          } else {
            selectedIds.delete(row.source_id);
            tr.classList.remove("selected-row");
          }
          updateSelectedCount();
        });
        checkTd.appendChild(checkbox);
        tr.appendChild(checkTd);

        const cellConfig = {
          source_id: "mono cell-ellipsis",
          info_id: "mono cell-ellipsis",
          title: "line-clamp-2",
          content_preview: "line-clamp-3"
        };
        headers.slice(1).forEach((header) => {
          const td = document.createElement("td");
          td.appendChild(textSpan(row[header], cellConfig[header] || "cell-ellipsis"));
          tr.appendChild(td);
        });
        return tr;
      }, colgroup);
      const pageSize = Number($("pageSize").value);
      const pages = Math.max(1, Math.ceil(total / pageSize));
      $("totalInfo").textContent = `共 ${total} 条`;
      $("pageInfo").textContent = `第 ${page} / ${pages} 页`;
      $("prevBtn").disabled = page <= 1;
      $("nextBtn").disabled = page >= pages;
      updateSelectedCount();
    }

    async function loadRecords(nextPage = 1) {
      page = nextPage;
      const params = new URLSearchParams({
        config_path: $("configPath").value.trim(),
        keyword: $("keyword").value.trim(),
        page: String(page),
        page_size: $("pageSize").value
      });
      setStatus("正在加载数据库内容...", "info");
      setLoading($("loadBtn"), true, "加载中...");
      try {
        const response = await fetch(`/api/db/records?${params.toString()}`);
        const data = await response.json();
        if (!response.ok) {
          setStatus(data.detail || response.statusText, "error");
          return;
        }
        total = data.total;
        records = data.records || [];
        renderRecords();
        setStatus(records.length ? "数据库内容已加载" : "没有符合条件的数据", records.length ? "success" : "warning");
      } catch (error) {
        setStatus(error.message || "加载失败", "error");
      } finally {
        setLoading($("loadBtn"), false, "加载中...");
      }
    }

    function selectCurrentPage() {
      records.forEach((row) => selectedIds.add(row.source_id));
      renderRecords();
    }

    function clearSelection() {
      selectedIds.clear();
      renderRecords();
    }

    async function startSelected() {
      if (selectedIds.size === 0) {
        setStatus("请至少选择一条数据", "error");
        return;
      }
      const payload = {
        config_path: $("configPath").value.trim(),
        field_config_path: $("fieldConfigPath").value.trim(),
        template_path: $("templatePath").value.trim(),
        llm_config_path: $("llmConfigPath").value.trim(),
        use_llm: $("useLlm").checked,
        keyword: $("keyword").value.trim(),
        selected_ids: Array.from(selectedIds)
      };
      setStatus("正在提交提取任务...", "info");
      setLoading($("startBtn"), true, "提交中...");
      try {
        const response = await fetch("/api/task/start-selected", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });
        const data = await response.json();
        if (!response.ok) {
          setStatus(data.detail || response.statusText, "error");
          return;
        }
        window.location.href = `/static/result.html?task_id=${encodeURIComponent(data.task_id)}`;
      } catch (error) {
        setStatus(error.message || "提交失败", "error");
      } finally {
        setLoading($("startBtn"), false, "提交中...");
      }
    }

    async function loadSample() {
      $("sampleStatus").textContent = "正在加载...";
      const response = await fetch("/api/sample");
      const data = await response.json();
      $("sampleRecord").textContent = JSON.stringify(data.record, null, 2);
      $("sampleStatus").textContent = data.sample_matched ? "结果一致" : "存在差异";
      renderTable("sampleDiffTable", data.diff_fields || [], ["field", "expected", "actual"], (row) => {
        const tr = document.createElement("tr");
        ["field", "expected", "actual"].forEach((key) => {
          const td = document.createElement("td");
          td.appendChild(textSpan(row[key]));
          tr.appendChild(td);
        });
        return tr;
      });
    }

    $("loadBtn").addEventListener("click", () => loadRecords(1));
    $("prevBtn").addEventListener("click", () => loadRecords(Math.max(1, page - 1)));
    $("nextBtn").addEventListener("click", () => loadRecords(page + 1));
    $("pageSize").addEventListener("change", () => loadRecords(1));
    $("selectPageBtn").addEventListener("click", selectCurrentPage);
    $("clearBtn").addEventListener("click", clearSelection);
    $("startBtn").addEventListener("click", startSelected);
    $("sampleBtn").addEventListener("click", loadSample);
    renderRecords();
  </script>
</body>
</html>
