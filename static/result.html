<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>提取结果</title>
  <style>
    :root {
      --primary: #0f5f75;
      --primary-dark: #0f3d4a;
      --accent: #f2b84b;
      --bg: #f4f7fb;
      --card: #ffffff;
      --border: #d8e1ea;
      --text: #1f2937;
      --muted: #6b7280;
      --success: #16a34a;
      --danger: #dc2626;
      --warning: #d97706;
      --info: #2563eb;
      --shadow: 0 10px 24px rgba(15, 23, 42, .07);
    }
    * { box-sizing: border-box; }
    html, body { width: 100%; overflow-x: hidden; }
    body {
      margin: 0;
      font-family: "Microsoft YaHei", "Segoe UI", Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    .topbar {
      min-height: 64px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 0 28px;
      background: linear-gradient(135deg, var(--primary-dark), #062b36);
      color: #fff;
      border-bottom: 3px solid var(--accent);
      box-shadow: 0 4px 14px rgba(15, 61, 74, .22);
    }
    .topbar h1 {
      margin: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 21px;
      letter-spacing: 0;
    }
    main {
      max-width: 1600px;
      margin: 0 auto;
      padding: 20px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      box-shadow: var(--shadow);
      margin-bottom: 18px;
      overflow: hidden;
    }
    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      min-height: 52px;
      padding: 14px 18px;
      border-bottom: 1px solid var(--border);
      background: #fff;
    }
    .card-title {
      margin: 0;
      font-size: 16px;
      font-weight: 700;
      color: #0f2530;
    }
    .card-body { padding: 18px; }
    .actions {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 10px;
    }
    .btn {
      min-height: 38px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 9px 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      color: #fff;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: background .15s ease, border-color .15s ease, transform .12s ease, box-shadow .15s ease;
      white-space: nowrap;
    }
    .btn:hover:not(.disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 18px rgba(15, 95, 117, .18);
    }
    .btn-primary { background: var(--primary); }
    .btn-primary:hover:not(.disabled) { background: #0d5368; }
    .btn-secondary {
      background: #eef3f8;
      border-color: #d6e0ea;
      color: #223344;
    }
    .download { background: var(--success); }
    .disabled { pointer-events: none; opacity: .45; transform: none; box-shadow: none; }
    .alert {
      display: flex;
      align-items: center;
      gap: 10px;
      min-height: 42px;
      padding: 11px 13px;
      border-radius: 6px;
      border: 1px solid transparent;
      font-size: 13px;
    }
    .alert.info { background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }
    .alert.success { background: #ecfdf3; color: #15803d; border-color: #bbf7d0; }
    .alert.error { background: #fef2f2; color: #b91c1c; border-color: #fecaca; }
    .spinner {
      width: 15px;
      height: 15px;
      border: 2px solid currentColor;
      border-right-color: transparent;
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(150px, 1fr));
      gap: 12px;
    }
    .metric {
      border: 1px solid #e5eaf0;
      border-radius: 8px;
      padding: 13px;
      background: #f8fafc;
      min-width: 0;
    }
    .metric b {
      display: block;
      color: var(--muted);
      font-size: 12px;
      margin-bottom: 6px;
    }
    .metric span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 800;
      font-size: 18px;
    }
    .metric.success span { color: var(--success); }
    .metric.danger span { color: var(--danger); }
    .metric.warning span { color: var(--warning); }
    .metric.file span { font-size: 12px; font-family: "Cascadia Mono", Consolas, "Courier New", monospace; color: #334155; }
    .table-shell {
      width: 100%;
      overflow-x: auto;
      overflow-y: auto;
      max-height: 540px;
      border-top: 1px solid var(--border);
      background: #fff;
    }
    table {
      table-layout: fixed;
      min-width: 2600px;
      width: 2600px;
      border-collapse: separate;
      border-spacing: 0;
      font-size: 12px;
    }
    .log-table {
      min-width: 1880px;
      width: 1880px;
    }
    th, td {
      border-bottom: 1px solid #e8edf3;
      border-right: 1px solid #edf2f7;
      padding: 10px 11px;
      text-align: left;
      vertical-align: middle;
    }
    th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f6f8fb;
      color: #334155;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    tbody tr:hover { background: #f8fbff; }
    .cell-ellipsis {
      display: block;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .missing { color: #9ca3af; }
    .badge {
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 3px 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      white-space: nowrap;
    }
    .badge.success { background: #dcfce7; color: #15803d; }
    .badge.failed { background: #fee2e2; color: #b91c1c; }
    .badge.skipped { background: #fef3c7; color: #b45309; }
    .badge.empty { background: #f1f5f9; color: #64748b; }
    .badge.neutral { background: #e8f4f8; color: var(--primary); }
    .col-narrow { width: 120px; }
    .col-medium { width: 170px; }
    .col-wide { width: 260px; }
    @media (max-width: 1366px) {
      .summary { grid-template-columns: repeat(3, minmax(150px, 1fr)); }
      main { padding: 16px; }
    }
    @media (max-width: 768px) {
      .topbar { padding: 12px 16px; align-items: flex-start; flex-direction: column; }
      .topbar h1 { font-size: 18px; }
      main { padding: 12px; }
      .card-header { align-items: flex-start; flex-direction: column; }
      .summary { grid-template-columns: 1fr 1fr; }
      .btn { width: 100%; }
      .actions { align-items: stretch; }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <h1><span aria-hidden="true">📊</span><span>提取结果</span></h1>
    <a class="btn btn-secondary" href="/static/index.html">返回数据库列表</a>
  </header>
  <main>
    <section class="card">
      <div class="card-header">
        <h2 class="card-title">任务状态</h2>
        <a id="downloadBtn" class="btn download disabled" href="#">下载 Excel</a>
      </div>
      <div class="card-body">
        <div id="status" class="alert info"><span class="spinner"></span><span>正在读取任务状态...</span></div>
      </div>
    </section>

    <section class="card">
      <div class="card-header"><h2 class="card-title">任务摘要</h2></div>
      <div class="card-body"><div id="summary" class="summary"></div></div>
    </section>

    <section class="card">
      <div class="card-header"><h2 class="card-title">固定 26 列结果</h2></div>
      <div class="table-shell"><table id="resultTable"></table></div>
    </section>

    <section class="card">
      <div class="card-header"><h2 class="card-title">采集日志</h2></div>
      <div class="table-shell"><table id="logTable" class="log-table"></table></div>
    </section>
  </main>

  <script>
    const columns = ["文章时间","审核日期","info_id","地区名称","个人账户计入办法","个人账户使用范围","病种名称","类型","标化类型","保险类型","人员类型","病种类型","就诊地域","医院类型","就诊情况","区间","起付标准","补助限额","报销比例","备注","相关资讯","审核状态0待审核1已审核","执行状态","开始执行时间","结束时间","是否需要手动修改执行状态(1是0否)"];
    const logColumns = ["source_id", "info_id", "title", "status", "message", "records", "time", "llm_used", "llm_success", "llm_error", "need_manual_review", "review_reason", "table_count", "table_row_count", "extraction_mode"];
    const evidenceColumns = ["source_id", "info_id", "row_index", "field", "value", "evidence", "confidence", "source", "rule_name"];
    const conflictColumns = ["source_id", "info_id", "row_index", "field", "rule_value", "llm_value", "final_value", "reason"];
    const taskId = new URLSearchParams(window.location.search).get("task_id");
    const $ = (id) => document.getElementById(id);

    function setStatus(text, type = "info", loading = false) {
      const el = $("status");
      el.className = `alert ${type}`;
      el.textContent = "";
      if (loading) {
        const spinner = document.createElement("span");
        spinner.className = "spinner";
        el.appendChild(spinner);
      }
      const label = document.createElement("span");
      label.textContent = text;
      el.appendChild(label);
    }

    function statusBadge(status) {
      const label = String(status ?? "");
      const cls = label === "success" || label === "true" ? "success" : label === "failed" || label === "false" ? "failed" : label === "skipped_keyword" ? "skipped" : label === "empty_content" ? "empty" : "neutral";
      const span = document.createElement("span");
      span.className = `badge ${cls}`;
      span.textContent = label;
      span.title = label;
      return span;
    }

    function valueNode(value, header = "") {
      const text = value ?? "";
      const span = document.createElement("span");
      if (header === "审核状态0待审核1已审核" || header === "是否需要手动修改执行状态(1是0否)") {
        span.className = "badge neutral";
      } else {
        span.className = `cell-ellipsis ${text === "-" ? "missing" : ""}`;
      }
      span.textContent = text;
      span.title = text;
      return span;
    }

    function renderTable(id, rows, headers, options = {}) {
      const table = $(id);
      table.innerHTML = "";
      if (options.colgroup) table.innerHTML = options.colgroup;
      const thead = document.createElement("thead");
      const head = document.createElement("tr");
      headers.forEach((header) => {
        const th = document.createElement("th");
        th.textContent = header;
        head.appendChild(th);
      });
      thead.appendChild(head);
      table.appendChild(thead);
      const tbody = document.createElement("tbody");
      rows.forEach((row) => {
        const tr = document.createElement("tr");
        headers.forEach((header) => {
          const td = document.createElement("td");
          td.appendChild(["status", "llm_used", "llm_success", "need_manual_review"].includes(header) ? statusBadge(row[header]) : valueNode(row[header], header));
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });
      table.appendChild(tbody);
    }

    function renderSummary(summary) {
      const items = [
        ["读取数", summary.read_count, ""],
        ["选择记录数", summary.selected_count, ""],
        ["成功数", summary.success_count, "success"],
        ["失败数", summary.failed_count, "danger"],
        ["跳过数", summary.skipped_count, "warning"],
        ["空内容数", summary.empty_count, ""],
        ["需要人工复核数", summary.manual_review_count, "warning"],
        ["LLM 调用成功数", summary.llm_success_count, "success"],
        ["LLM 调用失败数", summary.llm_failed_count, "danger"],
        ["输出文件", summary.output_file, "file"]
      ];
      $("summary").innerHTML = "";
      items.forEach(([label, value, cls]) => {
        const div = document.createElement("div");
        div.className = `metric ${cls}`;
        const name = document.createElement("b");
        name.textContent = label;
        const metric = document.createElement("span");
        const safeValue = cls === "file" ? (value ?? "") : (value ?? 0);
        metric.textContent = safeValue;
        metric.title = safeValue;
        div.appendChild(name);
        div.appendChild(metric);
        $("summary").appendChild(div);
      });
    }

    function renderModeSummary(logs) {
      const counts = { table_html: 0, table_text: 0, key_value: 0, rule_llm_fusion: 0, llm_only: 0, manual_review: 0 };
      (logs || []).forEach((log) => {
        const mode = log.extraction_mode || "";
        if (mode in counts) counts[mode] += 1;
        if (log.need_manual_review) counts.manual_review += 1;
      });
      const items = [
        ["HTML ?????", counts.table_html],
        ["???????", counts.table_text],
        ["key-value ?????", counts.key_value],
        ["LLM ???", counts.rule_llm_fusion + counts.llm_only],
        ["???????", counts.manual_review]
      ];
      $("modeSummary").innerHTML = "";
      items.forEach(([label, value]) => {
        const div = document.createElement("div");
        div.className = "metric";
        const name = document.createElement("b");
        name.textContent = label;
        const metric = document.createElement("span");
        metric.textContent = value ?? 0;
        div.appendChild(name);
        div.appendChild(metric);
        $("modeSummary").appendChild(div);
      });
    }

    async function poll() {
      if (!taskId) {
        setStatus("缺少 task_id", "error");
        return;
      }
      const statusRes = await fetch(`/api/task/status/${taskId}`);
      const status = await statusRes.json();
      if (status.status === "completed") {
        const resultRes = await fetch(`/api/task/result/${taskId}`);
        const result = await resultRes.json();
        setStatus(result.message || "任务已完成", "success");
        renderSummary(result.summary || {});
        const colgroup = `<colgroup>${columns.map((_, index) => `<col class="${index < 4 ? "col-wide" : "col-medium"}">`).join("")}</colgroup>`;
        renderTable("resultTable", result.data || [], columns, { colgroup });
        renderTable("logTable", result.logs || [], logColumns);
        renderModeSummary(result.logs || []);
        renderTable("evidenceTable", result.field_evidence || [], evidenceColumns);
        renderTable("conflictTable", result.conflict_evidence || [], conflictColumns);
        $("downloadBtn").href = `/api/task/download/${taskId}`;
        $("downloadBtn").classList.remove("disabled");
        return;
      }
      if (status.status === "failed") {
        setStatus(status.message || "任务失败", "error");
        return;
      }
      setStatus(status.message || "任务处理中...", status.status === "pending" ? "info" : "info", true);
      setTimeout(poll, 1200);
    }

    renderSummary({});
    renderTable("resultTable", [], columns);
    renderTable("logTable", [], logColumns);
    renderModeSummary([]);
    renderTable("evidenceTable", [], evidenceColumns);
    renderTable("conflictTable", [], conflictColumns);
    poll();
  </script>
</body>
</html>
